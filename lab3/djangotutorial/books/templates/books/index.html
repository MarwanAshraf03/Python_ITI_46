<a href="{% url 'new' %}">
  <p>Create a Book</p>
</a>

{% if books %} {% for book in books %}
<div>
  <a href="{% url 'show' book.id %}">
    <p>title: {{book.title}}</p>
  </a>
  <p>description: {{book.description}}</p>
  <p>price: {{book.price}}</p>
</div>
{% endfor %} {% else %}
<p>No Books available</p>
{% endif %}
